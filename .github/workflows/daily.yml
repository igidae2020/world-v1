name: world-daily-tick
on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sS -X POST "${{ secrets.CRON_URL }}" \
            -H "X-CRON-TOKEN: ${{ secrets.CRON_TOKEN }}"
